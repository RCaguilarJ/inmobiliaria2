<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capture Frame</title>
    <style>
      html, body {
        margin: 0;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
      }
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      canvas {
        width: 1280px;
        height: 720px;
        object-fit: contain;
        background: #111;
      }
      #label {
        position: fixed;
        left: 16px;
        top: 16px;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.55);
        font-size: 14px;
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body>
    <div id="label">loading</div>
    <video
      id="video"
      crossorigin="anonymous"
      muted
      playsinline
      preload="auto"
      src="file:///C:/Users/Desarrollo%20WordPress/Downloads/video_2026-06-22_11-42-04.webm"
      style="display:none"
    ></video>
    <canvas id="canvas" width="1280" height="720"></canvas>
    <script>
      const params = new URLSearchParams(window.location.search);
      const time = Number(params.get('time') || '0');
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const label = document.getElementById('label');
      const ctx = canvas.getContext('2d');

      function capture() {
        const scale = Math.min(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
        const width = video.videoWidth * scale;
        const height = video.videoHeight * scale;
        const x = (canvas.width - width) / 2;
        const y = (canvas.height - height) / 2;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, x, y, width, height);
        label.textContent = `time=${time.toFixed(2)} duration=${video.duration.toFixed(2)}`;
        document.title = 'ready';
      }

      video.addEventListener('loadedmetadata', () => {
        video.currentTime = Math.min(Math.max(0, time), Math.max(0, video.duration - 0.1));
      });

      video.addEventListener('seeked', () => {
        requestAnimationFrame(() => requestAnimationFrame(capture));
      });

      setTimeout(() => {
        if (document.title !== 'ready') {
          label.textContent = 'timeout';
          document.title = 'timeout';
        }
      }, 15000);
    </script>
  </body>
</html>
